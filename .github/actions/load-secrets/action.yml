---
name: Load Secrets from 1Password
description: Load secrets from 1Password and export them as environment variables

inputs:
  op-connect-host:
    description: 1Password Connect Host
    required: true
  op-connect-token:
    description: 1Password Connect Token
    required: true

runs:
  using: composite
  steps:
    - name: Configure 1Password Connect
      uses: 1password/load-secrets-action/configure@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
      with:
        connect-host: ${{ inputs.op-connect-host }}
        connect-token: ${{ inputs.op-connect-token }}

    - name: Load secrets
      uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
      with: {export-env: true}
      env:
        AWS_ACCESS_KEY_ID: op://Mikrotik-Terraform/Backblaze B2 State/username
        AWS_SECRET_ACCESS_KEY: op://Mikrotik-Terraform/Backblaze B2 State/password
        CLOUDFLARE_API_TOKEN: op://Mikrotik-Terraform/Cloudflare DNS Token/password
        MIKROTIK_USERNAME: op://Mikrotik-Terraform/Mikrotik/username
        MIKROTIK_PASSWORD: op://Mikrotik-Terraform/Mikrotik/password

        PPPOE_USERNAME: op://Badoink/Digi PPPoE/username
        PPPOE_PASSWORD: op://Badoink/Digi PPPoE/password

