---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Terragrunt CI
permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch: {}
  pull_request:
    branches: ["main"]
    paths:
      - root.hcl
      - infrastructure/**

jobs:
  terragrunt-plan:
    runs-on: infra-runners
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      - name: Configure 1Password Connect
        uses: 1password/load-secrets-action/configure@eb2efd0703da22a93c467f2d1ffbb6826c11e19c # v4.1.1
        with:
          connect-host: ${{ secrets.OP_CONNECT_HOST }}
          connect-token: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Load Secrets
        uses: 1password/load-secrets-action@eb2efd0703da22a93c467f2d1ffbb6826c11e19c # v4.1.1
        with: {export-env: true}
        env: { OP_ENV_FILE: ".env.1pass" }

      - name: Terragrunt Init
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: terragrunt run --all -- init -upgrade
        env:
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Terragrunt Plan
        id: plan
        continue-on-error: true
        env:
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: |
            set -o pipefail
            terragrunt run --all --no-color -- plan --detailed-exitcode 2>&1 | tee plan_output.txt
            TG_EXIT="${PIPESTATUS[0]}"
            [ "$TG_EXIT" -eq 0 ] || [ "$TG_EXIT" -eq 2 ] || exit "$TG_EXIT"

      - name: Upload Plan Output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plan-output
          path: plan_output.txt
          retention-days: 1

      - name: Fail if Plan Failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  comment-pr:
    runs-on: ubuntu-slim
    if: always() && github.event_name == 'pull_request'
    needs: terragrunt-plan
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      - name: Download Plan Output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: plan-output }

      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: "${{ secrets.BOT_APP_CLIENT_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Create PR comment
        env:
          GITHUB_TOKEN: "${{ steps.app-token.outputs.token }}"
        run: |
          uv run .github/scripts/generate-comment.py plan_output.txt comment_body.txt plan
          gh pr comment "${{ github.event.pull_request.number }}" --body-file comment_body.txt
