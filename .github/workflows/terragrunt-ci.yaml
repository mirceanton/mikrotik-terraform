---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Terragrunt CI
permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch: {}
  pull_request:
    branches: ["main"]
    paths:
      - root.hcl
      - infrastructure/**

jobs:
  terragrunt-plan:
    runs-on: infra-runners
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with: { cache: false }

      - name: Load Secrets
        uses: ./.github/actions/load-secrets
        with:
          op-connect-host: ${{ secrets.OP_CONNECT_HOST }}
          op-connect-token: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Terragrunt Init
        run: terragrunt run --all -- init -upgrade
        env:
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Terragrunt Plan
        id: plan
        continue-on-error: true
        env:
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}
        run: |
          set -o pipefail
          terragrunt run --all --no-color -- plan --detailed-exitcode 2>&1 | tee plan_output.txt
          TG_EXIT="${PIPESTATUS[0]}"
          [ "$TG_EXIT" -eq 0 ] || [ "$TG_EXIT" -eq 2 ] || exit "$TG_EXIT"

      - name: Upload Plan Output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plan-output
          path: plan_output.txt
          retention-days: 1

      - name: Fail if Plan Failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  comment-pr:
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs: terragrunt-plan
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Download Plan Output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: plan-output }

      - name: Generate Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Create PR comment
        env:
          GITHUB_TOKEN: "${{ steps.app-token.outputs.token }}"
        run: |
          uv run .github/scripts/generate-comment.py plan_output.txt comment_body.txt plan
          gh pr comment "${{ github.event.pull_request.number }}" --body-file comment_body.txt
