---
name: Lint
permissions: { contents: read }

on:
  workflow_dispatch: {}
  push: {}

jobs:
  check:
    runs-on: ubuntu-latest
    container: ghcr.io/mirceanton/actions-runner:2.334
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup mise
        uses: nick-fields/retry@v4.0.0
        with:
          command: mise install
          max_attempts: 3

      - name: Run linters
        run: task lint:check
