---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Terragrunt Drift Detection
permissions:
  contents: read
  issues: write

on:
  workflow_dispatch: {}
  schedule: [{ cron: "0 0/2 * * *" }] # Every 2 hours

jobs:
  terragrunt-plan:
    runs-on: infra-runners
    outputs:
      drift_detected: ${{ steps.plan.outputs.drift_detected }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      - name: Configure 1Password Connect
        uses: 1password/load-secrets-action/configure@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          connect-host: ${{ secrets.OP_CONNECT_HOST }}
          connect-token: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Load Secrets
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with: {export-env: true}
        env: { OP_ENV_FILE: ".env.1pass" }

      - name: Terragrunt Init
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: terragrunt run --all -- init -upgrade
        env:
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Terragrunt Plan
        id: plan
        env:
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: |
            set -o pipefail
            terragrunt run --all --no-color -- plan --detailed-exitcode 2>&1 | tee plan_output.txt || true
            TG_EXIT="${PIPESTATUS[0]}"

            if [ "$TG_EXIT" -eq 0 ]; then
              echo "drift_detected=false" >> "$GITHUB_OUTPUT"
            elif [ "$TG_EXIT" -eq 2 ]; then
              echo "drift_detected=true" >> "$GITHUB_OUTPUT"
            else
              echo "Terragrunt plan failed with exit code $TG_EXIT" >&2
              exit "$TG_EXIT"
            fi

      - name: Upload Plan Output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plan-output
          path: plan_output.txt
          retention-days: 1

  issue-management:
    runs-on: ubuntu-slim
    needs: terragrunt-plan
    env:
      ISSUE_TITLE: "⚠️ Terragrunt Drift Detected ⚠️"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      - name: Download Plan Output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: plan-output }

      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: "${{ secrets.BOT_APP_CLIENT_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Open Issue if Drift Detected
        if: needs.terragrunt-plan.outputs.drift_detected == 'true'
        env:
          GITHUB_TOKEN: "${{ steps.app-token.outputs.token }}"
          RUN_NUMBER: "${{ github.run_number }}"
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          uv run .github/scripts/generate-comment.py plan_output.txt issue_body.txt drift

          ISSUE_NUMBER=$(gh issue list --state "all" --search "$ISSUE_TITLE" --json "number" --jq ".[0].number")
          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue reopen "$ISSUE_NUMBER"
            gh issue edit "$ISSUE_NUMBER" --body-file issue_body.txt
          else
            gh issue create --title "$ISSUE_TITLE" --body-file issue_body.txt
            ISSUE_NUMBER=$(gh issue list --state "open" --search "$ISSUE_TITLE" --json "number" --jq ".[0].number")
          fi
          gh issue pin "$ISSUE_NUMBER"

      - name: Close GitHub Issue if No Drift
        if: needs.terragrunt-plan.outputs.drift_detected == 'false'
        env:
          GITHUB_TOKEN: "${{ steps.app-token.outputs.token }}"
          COMMENT: |
            ✅ No drift detected. Closing issue automatically.
            Verified in [workflow run #${{ github.run_number }}]("${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}").
        run: |
          ISSUE_NUMBER=$(gh issue list --state "open" --search "$ISSUE_TITLE" --json "number" --jq ".[0].number")
          echo "ISSUE_NUMBER is '$ISSUE_NUMBER'"
          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue close "$ISSUE_NUMBER" --comment "$COMMENT"
            gh issue unpin "$ISSUE_NUMBER"
          fi
