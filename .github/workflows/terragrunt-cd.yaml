---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Terragrunt CD
permissions: { contents: read }

on:
  workflow_dispatch: {}
  push:
    branches: ["main"]
    paths:
      - root.hcl
      - infrastructure/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TG_NON_INTERACTIVE: "true"

jobs:
  terragrunt-apply:
    runs-on: infra-runners
    environment: homelab
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup mise
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          command: mise install
          max_attempts: 3
          timeout_minutes: 5

      - name: Load Secrets
        uses: ./.github/actions/load-secrets
        with:
          op-connect-host: ${{ secrets.OP_CONNECT_HOST }}
          op-connect-token: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Terragrunt Init
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          command: terragrunt run --all -- init -upgrade
          timeout_minutes: 5
          max_attempts: 3
        env:
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Terragrunt Apply
        id: apply
        continue-on-error: true
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: |
            set -o pipefail
            terragrunt run --all --no-color -- apply -auto-approve 2>&1 | tee apply_output.txt
        env:
          OP_CONNECT_HOST: ${{ secrets.OP_CONNECT_HOST }}
          OP_CONNECT_TOKEN: ${{ secrets.OP_CONNECT_TOKEN }}

      - name: Upload Apply Output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apply-output
          path: apply_output.txt
          retention-days: 1

      - name: Fail if Apply Failed
        if: steps.apply.outcome == 'failure'
        run: exit 1

  comment-commit:
    runs-on: ubuntu-latest
    container: ghcr.io/mirceanton/actions-runner:2.335
    if: always()
    needs: terragrunt-apply
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup mise
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          command: mise install
          max_attempts: 3
          timeout_minutes: 3

      - name: Download Apply Output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { name: apply-output }

      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Create Commit Comment
        env:
          GITHUB_TOKEN: "${{ steps.app-token.outputs.token }}"
          APPLY_STATUS: "${{ needs.terragrunt-apply.result }}"
          RUN_NUMBER: "${{ github.run_number }}"
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          uv run .github/scripts/generate-comment.py apply_output.txt comment_body.txt apply
          gh api repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
            --method POST -f body="$(cat comment_body.txt)"
